name: rip-city-api
region: nyc
services:
- name: api
  source_dir: rip-city-backend
  github:
    repo: YOUR_USERNAME/ripcityticketdispatch
    branch: main
    deploy_on_push: true
  run_command: node src/server.js
  build_command: npm ci
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: basic-xxs
  http_port: 8080
  routes:
  - path: /
  health_check:
    http_path: /health
  cors:
    allow_origins:
    - "https://ripcityticketdispatch.works"
    - "https://www.ripcityticketdispatch.works"
    - "https://api.ripcityticketdispatch.works"
    allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    allow_headers:
    - Content-Type
    - Authorization
    - X-Requested-With
  envs:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "8080"
  - key: TICKETMASTER_API_KEY
    value: "your-api-key-here"
    type: SECRET
  - key: STRIPE_SECRET_KEY
    value: "your-stripe-secret-key-here"
    type: SECRET
  - key: STRIPE_PUBLISHABLE_KEY
    value: "pk_live_51RYpUG2NJsgM77flkraNcKVNDuwZZrg75i5TkSUVth6OIspc75O80vyutXsID6VzdyYJ35Y4Ugs5fceSiOeUGecf00FJSyYOTc"
    type: SECRET
  - key: STRIPE_WEBHOOK_SECRET
    value: "your-webhook-secret-here"
    type: SECRET
  - key: STRIPE_PRO_PRICE_ID
    value: "price_pro_monthly_999"
    type: SECRET
  - key: STRIPE_PREMIUM_PRICE_ID
    value: "price_premium_monthly_1999"
    type: SECRET
  - key: STRIPE_ENTERPRISE_PRICE_ID
    value: "price_enterprise_monthly_9999"
    type: SECRET
  - key: FRONTEND_URL
    value: "https://ripcityticketdispatch.works"
  - key: CORS_ORIGINS
    value: "https://ripcityticketdispatch.works,https://www.ripcityticketdispatch.works,https://api.ripcityticketdispatch.works"

domains:
- domain: api.ripcityticketdispatch.works
  type: PRIMARY
  wildcard: false
  zone: ripcityticketdispatch.works
